<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaD Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #ff4b2b; margin-bottom: 20px; }
        h2 { color: #aaa; font-size: 16px; margin-bottom: 12px; }

        .login-box, .panel { background: #1e1e1e; border-radius: 12px; padding: 24px; max-width: 500px; margin: 40px auto; border: 1px solid #333; }
        
        input { width: 100%; padding: 10px 14px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 12px; }
        input:focus { outline: none; border-color: #ff4b2b; }

        button { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-red   { background: #ff4b2b; color: #fff; width: 100%; margin-top: 4px; }
        .btn-blue  { background: #2196F3; color: #fff; }
        .btn-green { background: #4CAF50; color: #fff; }
        button:hover { opacity: 0.85; }

        .panel { display: none; max-width: 700px; }
        .panel.visible { display: block; }

        .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-row input { margin: 0; }

        .user-card { background: #2a2a2a; border-radius: 10px; padding: 16px; margin-bottom: 16px; border: 1px solid #333; }
        .user-card h3 { margin-bottom: 12px; color: #ffd700; }
        .field-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .field-row label { width: 110px; font-size: 13px; color: #aaa; flex-shrink: 0; }
        .field-row input { margin: 0; flex: 1; }

        .users-list { margin-top: 20px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 1px solid #333; }
        .user-row:hover { border-color: #ff4b2b; }
        .user-row .name { font-weight: bold; }
        .user-row .stats { font-size: 12px; color: #888; }

        .msg { padding: 10px; border-radius: 8px; margin-top: 12px; text-align: center; font-weight: bold; display: none; }
        .msg.success { background: #1b4a1b; color: #4CAF50; display: block; }
        .msg.error   { background: #4a1b1b; color: #ff4b2b; display: block; }
    </style>
</head>
<body>

<div class="login-box" id="login-box">
    <h1>⚔️ SaD Admin</h1>
    <h2>Введите ключ доступа</h2>
    <input type="password" id="admin-key-input" placeholder="Admin key..." />
    <button class="btn-red" onclick="login()">Войти</button>
    <div class="msg" id="login-msg"></div>
</div>

<div class="panel" id="panel">
    <h1>⚔️ SaD Admin Panel</h1>

    <!-- Поиск игрока -->
    <div style="margin-top:20px">
        <h2>🔍 Найти игрока по Telegram ID</h2>
        <div class="search-row">
            <input type="text" id="search-id" placeholder="Telegram ID (например 123456789)" />
            <button class="btn-blue" onclick="searchUser()">Найти</button>
        </div>
    </div>

    <!-- Карточка игрока -->
    <div class="user-card" id="user-card" style="display:none">
        <h3 id="user-title">Игрок</h3>
        <div class="field-row"><label>Монеты</label><input type="number" id="f-coins" /></div>
        <div class="field-row"><label>Уровень</label><input type="number" id="f-level" min="1" max="50" /></div>
        <div class="field-row"><label>XP</label><input type="number" id="f-xp" /></div>
        <div class="field-row"><label>Убийств</label><input type="number" id="f-kills" /></div>
        <div class="field-row"><label>Скин</label><input type="text" id="f-skin" /></div>
        <div class="field-row"><label>Скины</label><input type="text" id="f-owned" /></div>
        <button class="btn-green" onclick="saveUser()" style="margin-top:8px; width:100%">💾 Сохранить</button>
        <div class="msg" id="save-msg"></div>
    </div>

    <!-- Список игроков -->
    <div>
        <h2 style="margin-top:24px">👥 Топ игроков по монетам</h2>
        <button class="btn-blue" onclick="loadUsers()" style="margin-bottom:12px">Загрузить</button>
        <div class="users-list" id="users-list"></div>
    </div>
</div>

<script>
    let adminKey = '';
    let currentUserId = null;

    function login() {
        adminKey = document.getElementById('admin-key-input').value;
        fetch('/admin/users', { headers: { 'x-admin-key': adminKey } })
            .then(r => {
                if (r.status === 403) throw new Error('Неверный ключ');
                return r.json();
            })
            .then(() => {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('panel').classList.add('visible');
                loadUsers();
            })
            .catch(e => showMsg('login-msg', e.message, 'error'));
    }

    function searchUser() {
        const id = document.getElementById('search-id').value.trim();
        if (!id) return;
        fetch(`/admin/user/${id}`, { headers: { 'x-admin-key': adminKey } })
            .then(r => { if (!r.ok) throw new Error('Не найден'); return r.json(); })
            .then(data => fillCard(data))
            .catch(e => alert(e.message));
    }

    function fillCard(data) {
        currentUserId = data.telegram_id;
        document.getElementById('user-title').innerText =
            `${data.first_name || ''} @${data.username || '?'} (${data.telegram_id})`;
        document.getElementById('f-coins').value  = data.coins;
        document.getElementById('f-level').value  = data.level;
        document.getElementById('f-xp').value     = data.xp;
        document.getElementById('f-kills').value  = data.total_kills;
        document.getElementById('f-skin').value   = data.current_skin;
        document.getElementById('f-owned').value  = (data.owned_skins || []).join(', ');
        document.getElementById('user-card').style.display = 'block';
        document.getElementById('save-msg').className = 'msg';
    }

    function saveUser() {
        if (!currentUserId) return;
        const owned = document.getElementById('f-owned').value
            .split(',').map(s => s.trim()).filter(Boolean);

        fetch(`/admin/user/${currentUserId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
            body: JSON.stringify({
                coins:        parseInt(document.getElementById('f-coins').value),
                level:        parseInt(document.getElementById('f-level').value),
                xp:           parseInt(document.getElementById('f-xp').value),
                total_kills:  parseInt(document.getElementById('f-kills').value),
                current_skin: document.getElementById('f-skin').value,
                owned_skins:  owned
            })
        })
        .then(r => r.json())
        .then(() => showMsg('save-msg', '✅ Сохранено!', 'success'))
        .catch(() => showMsg('save-msg', '❌ Ошибка', 'error'));
    }

    function loadUsers() {
        fetch('/admin/users', { headers: { 'x-admin-key': adminKey } })
            .then(r => r.json())
            .then(users => {
                const list = document.getElementById('users-list');
                list.innerHTML = '';
                users.forEach(u => {
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML = `
                        <div>
                            <div class="name">${u.first_name || '?'} @${u.username || '?'}</div>
                            <div class="stats">ID: ${u.telegram_id} · Ур.${u.level} · ${u.coins}💰 · ${u.total_kills}💀</div>
                        </div>
                        <button class="btn-blue" onclick="event.stopPropagation(); loadById(${u.telegram_id})">Изменить</button>
                    `;
                    list.appendChild(row);
                });
            });
    }

    function loadById(id) {
        document.getElementById('search-id').value = id;
        searchUser();
        window.scrollTo(0, 0);
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.innerText = text;
        el.className = 'msg ' + type;
        setTimeout(() => el.className = 'msg', 3000);
    }

    document.getElementById('admin-key-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
